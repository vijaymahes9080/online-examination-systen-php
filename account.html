<script>
// Check if user is logged in
var currentUser = session.getUser();
if (!currentUser) {
  window.location.href = 'index.html';
}

var countdownTimer;
var timerSeconds = 0;

function startTimer(minutes, email, eid) {
  timerSeconds = minutes * 60;
  clearInterval(countdownTimer);
  
  function updateTimer() {
    var min = Math.floor(timerSeconds / 60);
    var sec = timerSeconds % 60;
    if (sec < 10) sec = "0" + sec;
    
    var countdownEl = document.getElementById('countdown');
    if (countdownEl) {
      countdownEl.innerHTML = '<span class="glyphicon glyphicon-time" aria-hidden="true"></span>&nbsp;Time Left: ' + min + ":" + sec;
    }
    
    if (timerSeconds <= 0) {
      clearInterval(countdownTimer);
      alert("Time is up!");
      // Auto-submit current state
      submitQuizAnswer(true); // forced final submit
    } else {
      timerSeconds--;
    }
  }
  
  updateTimer();
  countdownTimer = setInterval(updateTimer, 1000);
}

function handleSearch(event) {
  event.preventDefault();
  var tag = document.getElementById("search_tag").value.toLowerCase().trim();
  renderQuizList(tag);
  return false;
}

function renderQuizList(filterTag) {
  var quizzes = db.getQuizzes();
  var html = '<div class="panel"><div class="table-responsive"><table class="table table-striped title1">' +
             '<tr><td><b>S.N.</b></td><td><b>Topic</b></td><td><b>Total question</b></td><td><b>Marks</b></td><td><b>Time limit</b></td><td></td></tr>';
  var c = 1;
  
  quizzes.forEach(function(quiz) {
    if (filterTag && quiz.tag.toLowerCase().indexOf(filterTag) === -1) {
      return;
    }
    var totalMarks = quiz.sahi * quiz.total;
    var historyRecord = db.getQuizHistory(currentUser.email, quiz.eid);
    
    html += '<tr><td>' + c++ + '</td><td>' + quiz.title + 
            (historyRecord ? '&nbsp;<span title="This quiz is already solved by you" class="glyphicon glyphicon-ok" aria-hidden="true" style="color:#99cc32"></span>' : '') +
            '</td><td>' + quiz.total + '</td><td>' + totalMarks + '</td><td>' + quiz.time + '&nbsp;min</td><td>';
    
    if (!historyRecord) {
      html += '<b><a href="account.html?q=quiz&step=2&eid=' + quiz.eid + '&n=1&t=' + quiz.total + '" class="pull-right btn sub1" style="margin:0px;background:#99cc32"><span class="glyphicon glyphicon-new-window" aria-hidden="true"></span>&nbsp;<span class="title1"><b>Start</b></span></a></b>';
    } else {
      html += '<b><a href="#" onclick="restartQuiz(\'' + quiz.eid + '\', ' + quiz.total + ');" class="pull-right btn sub1" style="margin:0px;background:red"><span class="glyphicon glyphicon-repeat" aria-hidden="true"></span>&nbsp;<span class="title1"><b>Restart</b></span></a></b>';
    }
    html += '</td></tr>';
  });
  
  html += '</table></div></div>';
  document.getElementById("main_content").innerHTML = html;
}

function restartQuiz(eid, total) {
  if (confirm("Are you sure you want to restart this quiz? Your previous score will be deleted.")) {
    var historyRecord = db.getQuizHistory(currentUser.email, eid);
    if (historyRecord) {
      var scoreToSubtract = historyRecord.score;
      // Remove history
      var allHistory = JSON.parse(localStorage.getItem("db_history")) || [];
      allHistory = allHistory.filter(function(h) { return !(h.email === currentUser.email && h.eid === eid); });
      localStorage.setItem("db_history", JSON.stringify(allHistory));
      
      // Update ranks
      var allRanks = JSON.parse(localStorage.getItem("db_rank")) || [];
      var rIdx = allRanks.findIndex(function(r) { return r.email === currentUser.email; });
      if (rIdx !== -1) {
        allRanks[rIdx].score -= scoreToSubtract;
        allRanks[rIdx].time = new Date().toISOString();
        localStorage.setItem("db_rank", JSON.stringify(allRanks));
      }
    }
    window.location.href = 'account.html?q=quiz&step=2&eid=' + eid + '&n=1&t=' + total;
  }
}

function renderQuizQuestion(eid, sn, total) {
  var quiz = db.getQuiz(eid);
  var questions = db.getQuestions(eid);
  var question = questions.find(function(q) { return q.sn === parseInt(sn); });
  
  if (!question) {
    window.location.href = 'account.html?q=1';
    return;
  }
  
  // Start timer if first question
  if (parseInt(sn) === 1 && !countdownTimer) {
    startTimer(quiz.time, currentUser.email, eid);
  }
  
  var options = db.getOptions(question.qid);
  
  var html = '<div class="panel" style="margin:5%">';
  html += '<div id="countdown" class="pull-right timer" style="font-size:18px;font-weight:bold;color:red;"></div><br/><br/>';
  html += '<b>Question &nbsp;' + sn + '&nbsp;::<br />' + question.qns + '</b><br /><br />';
  html += '<form id="quiz_form" onsubmit="return handleQuestionSubmit(event, \'' + eid + '\', ' + sn + ', ' + total + ', \'' + question.qid + '\');"><br />';
  
  options.forEach(function(opt) {
    html += '<input type="radio" name="ans" value="' + opt.optionid + '" required>&nbsp;&nbsp;' + opt.option + '<br /><br />';
  });
  
  html += '<br /><button type="submit" class="btn btn-primary"><span class="glyphicon glyphicon-lock" aria-hidden="true"></span>&nbsp;Submit</button></form></div>';
  document.getElementById("main_content").innerHTML = html;
  
  // Update UI timer placeholder reference if already running
  if (countdownTimer) {
    var min = Math.floor(timerSeconds / 60);
    var sec = timerSeconds % 60;
    if (sec < 10) sec = "0" + sec;
    document.getElementById('countdown').innerHTML = '<span class="glyphicon glyphicon-time" aria-hidden="true"></span>&nbsp;Time Left: ' + min + ":" + sec;
  }
}

function handleQuestionSubmit(event, eid, sn, total, qid) {
  event.preventDefault();
  var selectedAns = document.querySelector('input[name="ans"]:checked').value;
  var correctAns = db.getAnswer(qid);
  var quiz = db.getQuiz(eid);
  
  var quizState = JSON.parse(sessionStorage.getItem("active_quiz_state")) || {
    score: 0,
    sahi: 0,
    wrong: 0,
    level: 0
  };
  
  quizState.level = sn;
  if (selectedAns === correctAns) {
    quizState.sahi++;
    quizState.score += quiz.sahi;
  } else {
    quizState.wrong++;
    quizState.score -= quiz.wrong;
  }
  
  sessionStorage.setItem("active_quiz_state", JSON.stringify(quizState));
  
  if (sn < total) {
    var nextSn = sn + 1;
    window.location.href = 'account.html?q=quiz&step=2&eid=' + eid + '&n=' + nextSn + '&t=' + total;
  } else {
    // Finish Quiz
    clearInterval(countdownTimer);
    countdownTimer = null;
    db.saveQuizAttempt(currentUser.email, eid, quizState.score, quizState.level, quizState.sahi, quizState.wrong);
    sessionStorage.removeItem("active_quiz_state");
    window.location.href = 'account.html?q=result&eid=' + eid;
  }
  return false;
}

function submitQuizAnswer(force) {
  if (force) {
    var urlParams = new URLSearchParams(window.location.search);
    var eid = urlParams.get('eid');
    var sn = parseInt(urlParams.get('n'));
    var total = parseInt(urlParams.get('t'));
    
    var quizState = JSON.parse(sessionStorage.getItem("active_quiz_state")) || {
      score: 0,
      sahi: 0,
      wrong: 0,
      level: sn - 1
    };
    
    db.saveQuizAttempt(currentUser.email, eid, quizState.score, quizState.level, quizState.sahi, quizState.wrong);
    sessionStorage.removeItem("active_quiz_state");
    clearInterval(countdownTimer);
    countdownTimer = null;
    window.location.href = 'account.html?q=result&eid=' + eid;
  }
}

function renderResult(eid) {
  var historyRecord = db.getQuizHistory(currentUser.email, eid);
  if (!historyRecord) {
    window.location.href = 'account.html?q=1';
    return;
  }
  
  var overallRankScore = 0;
  var rankRecord = db.getRanks().find(function(r) { return r.email === currentUser.email; });
  if (rankRecord) {
    overallRankScore = rankRecord.score;
  }
  
  var html = '<div class="panel">' +
             '<center><h1 class="title" style="color:#660033">Result</h1></center><br />' +
             '<table class="table table-striped title1" style="font-size:20px;font-weight:1000;">' +
             '<tr style="color:#66CCFF"><td>Total Questions</td><td>' + historyRecord.level + '</td></tr>' +
             '<tr style="color:#99cc32"><td>Right Answer&nbsp;<span class="glyphicon glyphicon-ok-circle" aria-hidden="true"></span></td><td>' + historyRecord.sahi + '</td></tr>' +
             '<tr style="color:red"><td>Wrong Answer&nbsp;<span class="glyphicon glyphicon-remove-circle" aria-hidden="true"></span></td><td>' + historyRecord.wrong + '</td></tr>' +
             '<tr style="color:#66CCFF"><td>Score&nbsp;<span class="glyphicon glyphicon-star" aria-hidden="true"></span></td><td>' + historyRecord.score + '</td></tr>' +
             '<tr style="color:#990000"><td>Overall Score&nbsp;<span class="glyphicon glyphicon-stats" aria-hidden="true"></span></td><td>' + overallRankScore + '</td></tr>' +
             '</table></div>';
  document.getElementById("main_content").innerHTML = html;
}

function renderHistory() {
  var attempts = db.getHistory(currentUser.email);
  var html = '<div class="panel title"><table class="table table-striped title1">' +
             '<tr style="color:red"><td><b>S.N.</b></td><td><b>Quiz</b></td><td><b>Questions Solved</b></td><td><b>Right</b></td><td><b>Wrong</b></td><td><b>Score</b></td></tr>';
  var c = 1;
  attempts.forEach(function(att) {
    var quiz = db.getQuiz(att.eid);
    var title = quiz ? quiz.title : "Deleted Quiz";
    html += '<tr><td>' + c++ + '</td><td>' + title + '</td><td>' + att.level + '</td><td>' + att.sahi + '</td><td>' + att.wrong + '</td><td>' + att.score + '</td></tr>';
  });
  html += '</table></div>';
  document.getElementById("main_content").innerHTML = html;
}

function renderRanking() {
  var ranks = db.getRanks();
  var html = '<div class="panel title"><div class="table-responsive"><table class="table table-striped title1">' +
             '<tr style="color:red"><td><b>Rank</b></td><td><b>Name</b></td><td><b>Gender</b></td><td><b>College</b></td><td><b>Score</b></td></tr>';
  var c = 1;
  ranks.forEach(function(rk) {
    var user = db.getUserByEmail(rk.email);
    if (!user) return;
    html += '<tr><td style="color:#99cc32"><b>' + c++ + '</b></td><td>' + user.name + '</td><td>' + user.gender + '</td><td>' + user.college + '</td><td>' + rk.score + '</td></tr>';
  });
  html += '</table></div></div>';
  document.getElementById("main_content").innerHTML = html;
}

function handleLogout() {
  session.logout();
  window.location.href = 'index.html';
}

window.onpopstate = function() {
  window.location.reload();
};

window.onload = function() {
  document.getElementById("hello_name").innerText = currentUser.name;
  
  var urlParams = new URLSearchParams(window.location.search);
  var q = urlParams.get('q');
  
  // Manage navigation tab active highlighting
  var tabs = document.querySelectorAll(".navbar-nav li");
  tabs.forEach(function(tab) { tab.classList.remove("active"); });
  
  if (q === '1') {
    document.getElementById("tab_home").classList.add("active");
    renderQuizList();
  } else if (q === '2') {
    document.getElementById("tab_history").classList.add("active");
    renderHistory();
  } else if (q === '3') {
    document.getElementById("tab_ranking").classList.add("active");
    renderRanking();
  } else if (q === 'quiz') {
    var step = urlParams.get('step');
    var eid = urlParams.get('eid');
    var n = urlParams.get('n');
    var t = urlParams.get('t');
    renderQuizQuestion(eid, n, t);
  } else if (q === 'result') {
    var eid = urlParams.get('eid');
    renderResult(eid);
  } else {
    // Default to home tab
    window.location.href = 'account.html?q=1';
  }
};
</script>
