<script>
// Check if admin is logged in
var currentAdmin = session.getAdmin();
if (!currentAdmin) {
  window.location.href = 'index.html';
}

function handleLogout() {
  session.logout();
  window.location.href = 'index.html';
}

function renderAdminHome() {
  var quizzes = db.getQuizzes();
  var html = '<div class="panel"><div class="table-responsive"><table class="table table-striped title1">' +
             '<tr><td><b>S.N.</b></td><td><b>Topic</b></td><td><b>Total question</b></td><td><b>Marks</b></td><td><b>Time limit</b></td><td></td></tr>';
  var c = 1;
  quizzes.forEach(function(quiz) {
    var totalMarks = quiz.sahi * quiz.total;
    html += '<tr><td>' + c++ + '</td><td>' + quiz.title + '</td><td>' + quiz.total + '</td><td>' + totalMarks + '</td><td>' + quiz.time + '&nbsp;min</td><td></td></tr>';
  });
  html += '</table></div></div>';
  document.getElementById("main_content").innerHTML = html;
}

function renderUsersList() {
  var users = db.getUsers();
  var html = '<div class="panel"><div class="table-responsive"><table class="table table-striped title1">' +
             '<tr><td><b>S.N.</b></td><td><b>Name</b></td><td><b>Gender</b></td><td><b>College</b></td><td><b>Email</b></td><td><b>Mobile</b></td><td></td></tr>';
  var c = 1;
  users.forEach(function(user) {
    html += '<tr><td>' + c++ + '</td><td>' + user.name + '</td><td>' + user.gender + '</td><td>' + user.college + '</td><td>' + user.email + '</td><td>' + user.mob + '</td>' +
            '<td><a title="Delete User" href="#" onclick="deleteUser(\'' + user.email + '\');"><b><span class="glyphicon glyphicon-trash" aria-hidden="true" style="color:red"></span></b></a></td></tr>';
  });
  html += '</table></div></div>';
  document.getElementById("main_content").innerHTML = html;
}

function deleteUser(email) {
  if (confirm("Are you sure you want to delete user: " + email + "?")) {
    db.deleteUser(email);
    renderUsersList();
  }
}

function renderRankingList() {
  var ranks = db.getRanks();
  var html = '<div class="panel title"><div class="table-responsive"><table class="table table-striped title1">' +
             '<tr style="color:red"><td><b>Rank</b></td><td><b>Name</b></td><td><b>Gender</b></td><td><b>College</b></td><td><b>Score</b></td></tr>';
  var c = 1;
  ranks.forEach(function(rk) {
    var user = db.getUserByEmail(rk.email);
    if (!user) return;
    html += '<tr><td style="color:#99cc32"><b>' + c++ + '</b></td><td>' + user.name + '</td><td>' + user.gender + '</td><td>' + user.college + '</td><td>' + rk.score + '</td></tr>';
  });
  html += '</table></div></div>';
  document.getElementById("main_content").innerHTML = html;
}

function renderFeedbackList(fid) {
  if (fid) {
    var feedbacks = db.getFeedbacks();
    var fb = feedbacks.find(function(f) { return f.id === fid; });
    if (!fb) {
      window.location.href = 'dash.html?q=3';
      return;
    }
    var html = '<br /><div class="panel"><a title="Back to Archive" href="dash.html?q=3"><b><span class="glyphicon glyphicon-level-up" aria-hidden="true"></span> Back</b></a>' +
               '<h2 style="text-align:center; margin-top:-15px;font-family: \'Ubuntu\', sans-serif;"><b>' + fb.subject + '</b></h2>' +
               '<div style="margin-left:10px;margin-right:10px; max-height:450px; line-height:35px;padding:5px;">' +
               '<span style="line-height:35px;padding:5px;">-&nbsp;<b>DATE:</b>&nbsp;' + fb.date + '</span>' +
               '<span style="line-height:35px;padding:5px;">&nbsp;<b>Time:</b>&nbsp;' + fb.time + '</span>' +
               '<span style="line-height:35px;padding:5px;">&nbsp;<b>By:</b>&nbsp;' + fb.name + '</span><br />' +
               '<div style="border: 1px solid #ccc; padding: 15px; border-radius: 5px; background: #fff; color: #333;">' + fb.feedback + '</div></div></div>';
    document.getElementById("main_content").innerHTML = html;
  } else {
    var feedbacks = db.getFeedbacks();
    var html = '<div class="panel"><div class="table-responsive"><table class="table table-striped title1">' +
               '<tr><td><b>S.N.</b></td><td><b>Subject</b></td><td><b>Email</b></td><td><b>Date</b></td><td><b>Time</b></td><td><b>By</b></td><td></td><td></td></tr>';
    var c = 1;
    feedbacks.forEach(function(fb) {
      html += '<tr><td>' + c++ + '</td>' +
              '<td><a title="Click to open feedback" href="dash.html?q=3&fid=' + fb.id + '">' + fb.subject + '</a></td><td>' + fb.email + '</td><td>' + fb.date + '</td><td>' + fb.time + '</td><td>' + fb.name + '</td>' +
              '<td><a title="Open Feedback" href="dash.html?q=3&fid=' + fb.id + '"><b><span class="glyphicon glyphicon-folder-open" aria-hidden="true" style="color:blue"></span></b></a></td>' +
              '<td><a title="Delete Feedback" href="#" onclick="deleteFeedback(\'' + fb.id + '\');"><b><span class="glyphicon glyphicon-trash" aria-hidden="true" style="color:red"></span></b></a></td></tr>';
    });
    html += '</table></div></div>';
    document.getElementById("main_content").innerHTML = html;
  }
}

function deleteFeedback(id) {
  if (confirm("Are you sure you want to delete this feedback?")) {
    db.deleteFeedback(id);
    renderFeedbackList();
  }
}

function renderAddQuizForm() {
  var html = '<div class="row"><span class="title1" style="margin-left:40%;font-size:30px;"><b>Enter Quiz Details</b></span><br /><br />' +
             '<div class="col-md-3"></div><div class="col-md-6">' +
             '<form class="form-horizontal title1" onsubmit="return handleQuizDetailsSubmit(event);"><fieldset>' +
             '<div class="form-group"><div class="col-md-12"><input id="name" placeholder="Enter Quiz title" class="form-control input-md" type="text" required></div></div>' +
             '<div class="form-group"><div class="col-md-12"><input id="total" placeholder="Enter total number of questions" class="form-control input-md" type="number" min="1" required></div></div>' +
             '<div class="form-group"><div class="col-md-12"><input id="right" placeholder="Enter marks on right answer" class="form-control input-md" min="0" type="number" required></div></div>' +
             '<div class="form-group"><div class="col-md-12"><input id="wrong" placeholder="Enter minus marks on wrong answer without sign" class="form-control input-md" min="0" type="number" required></div></div>' +
             '<div class="form-group"><div class="col-md-12"><input id="time" placeholder="Enter time limit for test in minute" class="form-control input-md" min="1" type="number" required></div></div>' +
             '<div class="form-group"><div class="col-md-12"><input id="tag" placeholder="Enter #tag which is used for searching" class="form-control input-md" type="text" required></div></div>' +
             '<div class="form-group"><div class="col-md-12"><textarea rows="8" cols="8" id="desc" class="form-control" placeholder="Write description here..."></textarea></div></div>' +
             '<div class="form-group"><div class="col-md-12"><input type="submit" style="margin-left:45%" class="btn btn-primary" value="Next"/></div></div>' +
             '</fieldset></form></div></div>';
  document.getElementById("main_content").innerHTML = html;
}

function handleQuizDetailsSubmit(event) {
  event.preventDefault();
  var title = document.getElementById("name").value;
  var total = document.getElementById("total").value;
  var right = document.getElementById("right").value;
  var wrong = document.getElementById("wrong").value;
  var time = document.getElementById("time").value;
  var tag = document.getElementById("tag").value;
  var desc = document.getElementById("desc").value;
  
  var eid = db.addQuiz(title, right, wrong, total, time, desc, tag);
  window.location.href = 'dash.html?q=4&step=2&eid=' + eid + '&n=' + total;
  return false;
}

function renderAddQuestionsForm(eid, n) {
  var html = '<div class="row"><span class="title1" style="margin-left:40%;font-size:30px;"><b>Enter Question Details</b></span><br /><br />' +
             '<div class="col-md-3"></div><div class="col-md-6">' +
             '<form class="form-horizontal title1" onsubmit="return handleQuestionsSubmit(event, \'' + eid + '\', ' + n + ');"><fieldset>';
             
  for (var i = 1; i <= n; i++) {
    html += '<b>Question number&nbsp;' + i + '&nbsp;:</><br />' +
            '<div class="form-group"><div class="col-md-12"><textarea rows="3" cols="5" id="qns' + i + '" class="form-control" placeholder="Write question number ' + i + ' here..." required></textarea></div></div>' +
            '<div class="form-group"><div class="col-md-12"><input id="' + i + '1' + '" placeholder="Enter option a" class="form-control input-md" type="text" required></div></div>' +
            '<div class="form-group"><div class="col-md-12"><input id="' + i + '2' + '" placeholder="Enter option b" class="form-control input-md" type="text" required></div></div>' +
            '<div class="form-group"><div class="col-md-12"><input id="' + i + '3' + '" placeholder="Enter option c" class="form-control input-md" type="text" required></div></div>' +
            '<div class="form-group"><div class="col-md-12"><input id="' + i + '4' + '" placeholder="Enter option d" class="form-control input-md" type="text" required></div></div>' +
            '<br /><b>Correct answer</b>:<br />' +
            '<select id="ans' + i + '" class="form-control input-md" required>' +
              '<option value="">Select answer for question ' + i + '</option>' +
              '<option value="a">option a</option>' +
              '<option value="b">option b</option>' +
              '<option value="c">option c</option>' +
              '<option value="d">option d</option>' +
            '</select><br /><br />';
  }
  
  html += '<div class="form-group"><div class="col-md-12"><input type="submit" style="margin-left:45%" class="btn btn-primary" value="Submit"/></div></div>';
  html += '</fieldset></form></div></div>';
  document.getElementById("main_content").innerHTML = html;
}

function handleQuestionsSubmit(event, eid, n) {
  event.preventDefault();
  for (var i = 1; i <= n; i++) {
    var qid = Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
    var qns = document.getElementById('qns' + i).value;
    
    db.addQuestion(eid, qid, qns, 4, i);
    
    var oaid = Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
    var obid = Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
    var ocid = Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
    var odid = Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
    
    var optA = document.getElementById(i + '1').value;
    var optB = document.getElementById(i + '2').value;
    var optC = document.getElementById(i + '3').value;
    var optD = document.getElementById(i + '4').value;
    
    db.addOption(qid, optA, oaid);
    db.addOption(qid, optB, obid);
    db.addOption(qid, optC, ocid);
    db.addOption(qid, optD, odid);
    
    var corrVal = document.getElementById('ans' + i).value;
    var corrId = oaid;
    if (corrVal === 'b') corrId = obid;
    else if (corrVal === 'c') corrId = ocid;
    else if (corrVal === 'd') corrId = odid;
    
    db.setAnswer(qid, corrId);
  }
  alert("Quiz added successfully");
  window.location.href = 'dash.html?q=0';
  return false;
}

function renderRemoveQuiz() {
  var quizzes = db.getQuizzes();
  var html = '<div class="panel"><div class="table-responsive"><table class="table table-striped title1">' +
             '<tr><td><b>S.N.</b></td><td><b>Topic</b></td><td><b>Total question</b></td><td><b>Marks</b></td><td><b>Time limit</b></td><td></td></tr>';
  var c = 1;
  quizzes.forEach(function(quiz) {
    var totalMarks = quiz.sahi * quiz.total;
    html += '<tr><td>' + c++ + '</td><td>' + quiz.title + '</td><td>' + quiz.total + '</td><td>' + totalMarks + '</td><td>' + quiz.time + '&nbsp;min</td><td>' +
            '<b><a href="#" onclick="removeQuiz(\'' + quiz.eid + '\');" class="pull-right btn sub1" style="margin:0px;background:red"><span class="glyphicon glyphicon-trash" aria-hidden="true"></span>&nbsp;<span class="title1"><b>Remove</b></span></a></b></td></tr>';
  });
  html += '</table></div></div>';
  document.getElementById("main_content").innerHTML = html;
}

function removeQuiz(eid) {
  if (confirm("Are you sure you want to remove this quiz and all its questions/answers?")) {
    db.removeQuiz(eid);
    renderRemoveQuiz();
  }
}

window.onpopstate = function() {
  window.location.reload();
};

window.onload = function() {
  var urlParams = new URLSearchParams(window.location.search);
  var q = urlParams.get('q');
  
  var tabs = document.querySelectorAll(".navbar-nav li");
  tabs.forEach(function(tab) { tab.classList.remove("active"); });
  
  if (q === '0') {
    document.getElementById("tab_home").classList.add("active");
    renderAdminHome();
  } else if (q === '1') {
    document.getElementById("tab_user").classList.add("active");
    renderUsersList();
  } else if (q === '2') {
    document.getElementById("tab_ranking").classList.add("active");
    renderRankingList();
  } else if (q === '3') {
    document.getElementById("tab_feedback").classList.add("active");
    var fid = urlParams.get('fid');
    renderFeedbackList(fid);
  } else if (q === '4') {
    document.getElementById("tab_addquiz").classList.add("active");
    var step = urlParams.get('step');
    if (step === '2') {
      var eid = urlParams.get('eid');
      var n = parseInt(urlParams.get('n'));
      renderAddQuestionsForm(eid, n);
    } else {
      renderAddQuizForm();
    }
  } else if (q === '5') {
    document.getElementById("tab_removequiz").classList.add("active");
    renderRemoveQuiz();
  } else {
    window.location.href = 'dash.html?q=0';
  }
};
</script>
