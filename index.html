<script>
// Check if already logged in
if (session.getUser()) {
  window.location.href = 'account.html?q=1';
} else if (session.getAdmin()) {
  window.location.href = 'dash.html?q=0';
}

function validateForm() {
  var y = document.getElementById("signup_name").value;
  if (y == null || y == "") {
    alert("Name must be filled out.");
    return false;
  }
  var z = document.getElementById("signup_college").value;
  if (z == null || z == "") {
    alert("college must be filled out.");
    return false;
  }
  var x = document.getElementById("signup_email").value;
  var atpos = x.indexOf("@");
  var dotpos = x.lastIndexOf(".");
  if (atpos < 1 || dotpos < atpos + 2 || dotpos + 2 >= x.length) {
    alert("Not a valid e-mail address.");
    return false;
  }
  var a = document.getElementById("signup_password").value;
  if (a == null || a == "") {
    alert("Password must be filled out");
    return false;
  }
  if (a.length < 5 || a.length > 25) {
    alert("Passwords must be 5 to 25 characters long.");
    return false;
  }
  var b = document.getElementById("signup_cpassword").value;
  if (a != b) {
    alert("Passwords must match.");
    return false;
  }
  return true;
}

function handleLogin(event) {
  event.preventDefault();
  var email = document.getElementById("signin_email").value;
  var password = document.getElementById("signin_password").value;
  var user = db.getUser(email, password);
  if (user) {
    session.setUser(user);
    window.location.href = 'account.html?q=1';
  } else {
    alert("Wrong Username or Password");
  }
  return false;
}

function handleSignup(event) {
  event.preventDefault();
  if (!validateForm()) return false;
  
  var name = document.getElementById("signup_name").value;
  var gender = document.getElementById("signup_gender").value;
  var college = document.getElementById("signup_college").value;
  var email = document.getElementById("signup_email").value;
  var mob = document.getElementById("signup_mob").value;
  var password = document.getElementById("signup_password").value;
  
  var success = db.addUser(name, gender, college, email, mob, password);
  if (success) {
    var user = db.getUser(email, password);
    session.setUser(user);
    window.location.href = 'account.html?q=1';
  } else {
    alert("Email Already Registered!!!");
  }
  return false;
}

function handleAdminLogin(event) {
  event.preventDefault();
  var uname = document.getElementById("admin_uname").value;
  var password = document.getElementById("admin_password").value;
  var admin = db.getAdmin(uname, password);
  if (admin) {
    session.setAdmin(admin);
    window.location.href = 'dash.html?q=0';
  } else {
    alert("Warning : Access denied");
  }
  return false;
}

window.onload = function() {
  var urlParams = new URLSearchParams(window.location.search);
  var w = urlParams.get('w');
  if (w) {
    alert(w);
  }
};
</script>
